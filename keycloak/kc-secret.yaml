apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  serviceName: keycloak-discovery
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "keycloak-role"
        vault.hashicorp.com/auth-config-audience: "https://kubernetes.default.svc.cluster.local"
        vault.hashicorp.com/agent-inject-secret-credentials: "kv/data/keycloak"
        vault.hashicorp.com/agent-inject-template-credentials: |
          {{- with secret "kv/data/keycloak" -}}
          export KC_DB_PASSWORD="{{ .Data.data.password }}"
          export KC_DB_USERNAME="{{ .Data.data.user }}"
          export KC_BOOTSTRAP_ADMIN_PASSWORD="{{ .Data.data.password }}"
          export KC_BOOTSTRAP_ADMIN_USERNAME="{{ .Data.data.user }}"
          {{- end -}}
    spec:
      serviceAccountName: keycloak-sa
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.5
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -f /vault/secrets/credentials ]; then
                source /vault/secrets/credentials
              fi
              /opt/keycloak/bin/kc.sh start
          env:
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_CACHE
              value: "ispn"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: KC_CACHE_EMBEDDED_NETWORK_BIND_ADDRESS
              value: '$(POD_IP)'
            - name: KC_DB_URL_DATABASE
              value: 'keycloak'
            - name: KC_DB_URL_HOST
              value: 'postgres'
            - name: KC_DB
              value: 'postgres'
          ports:
            - name: http
              containerPort: 8080
          # Probe設定などは維持
          startupProbe:
            httpGet:
              path: /health/started
              port: 9000
            periodSeconds: 1
            failureThreshold: 600