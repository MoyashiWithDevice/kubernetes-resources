apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  serviceName: keycloak-discovery
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      serviceAccountName: keycloak-sa
      volumes:
        - name: vault-secrets
          emptyDir: {}
      initContainers:
        - name: vault-fetch
          image: hashicorp/vault:1.20
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              export VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login role=keycloak-role jwt=$KUBE_TOKEN)
              
              USER=$(vault kv get -field=username kv/keycloak)
              PASS=$(vault kv get -field=password kv/keycloak)
              
              echo "KC_DB_USERNAME=$USER" > /vault/secrets/credentials
              echo "KC_DB_PASSWORD=$PASS" >> /vault/secrets/credentials
              echo "KC_BOOTSTRAP_ADMIN_USERNAME=$USER" >> /vault/secrets/credentials
              echo "KC_BOOTSTRAP_ADMIN_PASSWORD=$PASS" >> /vault/secrets/credentials

          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.5
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -f /vault/secrets/credentials ]; then
                while read -r line || [ -n "$line" ]; do
                  export "$line"
                done < /vault/secrets/credentials
              fi
              exec /opt/keycloak/bin/kc.sh start
          env:
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_CACHE
              value: "ispn"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: KC_CACHE_EMBEDDED_NETWORK_BIND_ADDRESS
              value: '$(POD_IP)'
            - name: KC_DB_URL_DATABASE
              value: 'keycloak'
            - name: KC_DB_URL_HOST
              value: 'postgres'
            - name: KC_DB
              value: 'postgres'
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
          ports:
            - name: http
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /health/started
              port: 9000
            periodSeconds: 1
            failureThreshold: 600