apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  serviceName: keycloak-discovery
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      serviceAccountName: keycloak-sa
      volumes:
        - name: vault-secrets
          emptyDir: {}
      initContainers:
        - name: vault-fetch
          image: hashicorp/vault:1.20
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              
              echo "Logging in to Vault..."
              VAULT_TOKEN=$(curl -s --request POST \
                --data "{\"jwt\": \"$KUBE_TOKEN\", \"role\": \"keycloak-role\"}" \
                ${VAULT_ADDR}/v1/auth/kubernetes/login | jq -r '.auth.client_token')

              echo "Fetching secrets from API..."
              # パスを kv/data/keycloak に修正
              RESPONSE=$(curl -s --header "X-Vault-Token: $VAULT_TOKEN" \
                ${VAULT_ADDR}/v1/kv/data/keycloak)

              USER=$(echo $RESPONSE | jq -r '.data.data.user')
              PASS=$(echo $RESPONSE | jq -r '.data.data.password')

              if [ "$USER" = "null" ] || [ "$PASS" = "null" ]; then
                echo "Error: Secrets not found in Vault response"
                exit 1
              fi

              # Keycloak用の環境変数を書き出し
              echo "export KC_DB_USERNAME=${USER}" > /vault/secrets/credentials
              echo "export KC_DB_PASSWORD=${PASS}" >> /vault/secrets/credentials
              echo "export KC_BOOTSTRAP_ADMIN_USERNAME=${USER}" >> /vault/secrets/credentials
              echo "export KC_BOOTSTRAP_ADMIN_PASSWORD=${PASS}" >> /vault/secrets/credentials
              
              echo "Successfully prepared Keycloak credentials."
              
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.5
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -f /vault/secrets/credentials ]; then
                . /vault/secrets/credentials
              fi
              /opt/keycloak/bin/kc.sh start
          env:
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_CACHE
              value: "ispn"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: KC_CACHE_EMBEDDED_NETWORK_BIND_ADDRESS
              value: '$(POD_IP)'
            - name: KC_DB_URL_DATABASE
              value: 'keycloak'
            - name: KC_DB_URL_HOST
              value: 'postgres'
            - name: KC_DB
              value: 'postgres'
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
          ports:
            - name: http
              containerPort: 8080
          startupProbe:
            httpGet:
              path: /health/started
              port: 9000
            periodSeconds: 1
            failureThreshold: 600