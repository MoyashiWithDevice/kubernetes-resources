apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: keycloak
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "keycloak-role"
          # ここに audience を追加
          serviceAccountRef:
            name: keycloak-sa
            audiences: 
              - "https://kubernetes.default.svc.cluster.local"

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-credentials
  namespace: keycloak
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: keycloak-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: kv/data/keycloak
        property: user
    - secretKey: password
      remoteRef:
        key: kv/data/keycloak
        property: password