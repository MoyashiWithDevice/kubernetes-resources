apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
spec:
  template:
    metadata:
      annotations:
        # Vault Agent を有効化
        vault.hashicorp.com/agent-inject: "true"
        # 使用するロール名
        vault.hashicorp.com/role: "keycloak-role"
        # 認証時の audience (先ほど確認したもの)
        vault.hashicorp.com/auth-config-audience: "https://kubernetes.default.svc.cluster.local"
        # テンプレート：Vaultの値をどのファイルに書き出すか定義
        vault.hashicorp.com/agent-inject-secret-credentials: "kv/data/keycloak"
        # 書き出す内容のフォーマット（シェル変数形式）
        vault.hashicorp.com/agent-inject-template-credentials: |
          {{- with secret "kv/data/keycloak" -}}
          export KC_DB_PASSWORD="{{ .Data.data.password }}"
          export KC_DB_USERNAME="{{ .Data.data.user }}"
          export KC_BOOTSTRAP_ADMIN_PASSWORD="{{ .Data.data.password }}"
          export KC_BOOTSTRAP_ADMIN_USERNAME="{{ .Data.data.user }}"
          {{- end -}}
    spec:
      serviceAccountName: keycloak-sa # 作成したSAを指定
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.5
          # 重要：起動時に注入されたファイルを読み込むように command を変更
          command: ["/bin/sh", "-c"]
          args:
            - |
              source /vault/secrets/credentials && /opt/keycloak/bin/kc.sh start
          env:
            # 固定値のみここに残す
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            # ... 他の設定