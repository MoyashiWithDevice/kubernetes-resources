apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  ports:
    - protocol: TCP
      port: 8080
      targetPort: http
      name: http
  selector:
    app: keycloak
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-discovery
  namespace: keycloak
  labels:
    app: keycloak
spec:
  selector:
    app: keycloak
  clusterIP: None
  type: ClusterIP

---

apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: keycloak
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      serviceAccountName: keycloak-sa
      volumes:
        - name: vault-secrets
          emptyDir: {}
        - name: postgres-data
          emptyDir: {}
      initContainers:
        - name: vault-fetch
          image: hashicorp/vault:1.20
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              # 1. Kubernetesトークンでログインし、トークンのみを抽出
              KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              
              echo "Logging in to Vault..."
              VAULT_TOKEN=$(curl -s --request POST \
                --data "{\"jwt\": \"$KUBE_TOKEN\", \"role\": \"keycloak-role\"}" \
                ${VAULT_ADDR}/v1/auth/kubernetes/login | jq -r '.auth.client_token')

              # 2. 直接APIを叩いて秘密情報を取得
              # 以前のエラーの原因だった「data」の重複を避けるため、パスを正確に指定
              echo "Fetching secret..."
              RESPONSE=$(curl -s --header "X-Vault-Token: $VAULT_TOKEN" \
                ${VAULT_ADDR}/v1/kv/data/keycloak)

              # 3. jqでパースしてファイルに書き出す
              DB_USER=$(echo $RESPONSE | jq -r '.data.data.user')
              DB_PASS=$(echo $RESPONSE | jq -r '.data.data.password')

              if [ "$DB_USER" = "null" ] || [ "$DB_PASS" = "null" ]; then
                echo "Error: Secrets not found in response"
                exit 1
              fi

              echo "export POSTGRES_USER=${DB_USER}" > /vault/secrets/credentials
              echo "export POSTGRES_PASSWORD=${DB_PASS}" >> /vault/secrets/credentials
              echo "Credentials stored successfully."
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
      containers:
        - name: postgres
          image: mirror.gcr.io/postgres:17
          command: ["/bin/sh", "-c"]
          args:
            - |
              # source ではなく . を使う
              if [ -f /vault/secrets/credentials ]; then
                . /vault/secrets/credentials
              fi
              docker-entrypoint.sh postgres
          env:
            - name: POSTGRES_DB
              value: "keycloak"
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
            - name: postgres-data
              mountPath: /var/lib/postgresql/data