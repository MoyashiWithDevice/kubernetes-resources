apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  ports:
    - protocol: TCP
      port: 8080
      targetPort: http
      name: http
  selector:
    app: keycloak
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-discovery
  namespace: keycloak
  labels:
    app: keycloak
spec:
  selector:
    app: keycloak
  clusterIP: None
  type: ClusterIP

---

apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: keycloak
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      serviceAccountName: keycloak-sa
      volumes:
        - name: vault-secrets
          emptyDir: {}
      initContainers:
        - name: vault-fetch
          image: hashicorp/vault:1.15 # Vault CLIが入っている軽量イメージ
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
          command: ["/bin/sh", "-c"]
          args:
            - |
              # 1. KubernetesトークンでVaultにログイン
              KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login role=keycloak-role jwt=$KUBE_TOKEN)
              
              # 2. VaultからKVデータを取得 (JSON)
              # kv/data/keycloak の中身が { "data": { "user": "...", "password": "..." } } であることを想定
              vault kv get -format=json kv/data/keycloak > /tmp/secrets.json
              
              # 3. メインコンテナが読み込める形式で共有ボリュームに書き出し
              # jqを使ってパースし、export文を作る
              echo "export POSTGRES_USER=$(cat /tmp/secrets.json | jq -r .data.data.user)" > /vault/secrets/credentials
              echo "export POSTGRES_PASSWORD=$(cat /tmp/secrets.json | jq -r .data.data.password)" >> /vault/secrets/credentials
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
      containers:
        - name: postgres
          image: mirror.gcr.io/postgres:17
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -f /vault/secrets/credentials ]; then
                source /vault/secrets/credentials
              fi
              docker-entrypoint.sh postgres
          env:
            - name: POSTGRES_DB
              value: "keycloak"
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
            - name: postgres-data
              mountPath: /var/lib/postgresql/data