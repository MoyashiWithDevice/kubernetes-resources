apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
spec:
  ports:
    - protocol: TCP
      port: 8080
      targetPort: http
      name: http
  selector:
    app: keycloak
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-discovery
  namespace: keycloak
  labels:
    app: keycloak
spec:
  selector:
    app: keycloak
  clusterIP: None
  type: ClusterIP

---

apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: keycloak
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      serviceAccountName: keycloak-sa
      volumes:
        - name: vault-secrets
          emptyDir: {}
        - name: postgres-data
          emptyDir: {}
      initContainers:
        - name: vault-fetch
          image: hashicorp/vault:1.20
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              # 認証してトークンを環境変数にセット
              export VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login role=keycloak-role jwt=$KUBE_TOKEN)
              
              # -field オプションを使えば jq は不要
              USER=$(vault read -field=user kv/data/keycloak)
              PASS=$(vault read -field=password kv/data/keycloak)
              
              # ファイルを作成
              echo "POSTGRES_USER='${USER}'" > /vault/secrets/credentials
              echo "POSTGRES_PASSWORD='${PASS}'" >> /vault/secrets/credentials

          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
      containers:
        - name: postgres
          image: mirror.gcr.io/postgres:17
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -f /vault/secrets/credentials ]; then
                while read -r line; do export "$line"; done < /vault/secrets/credentials
              fi
              exec docker-entrypoint.sh postgres
          env:
            - name: POSTGRES_DB
              value: "keycloak"
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
            - name: postgres-data
              mountPath: /var/lib/postgresql/data