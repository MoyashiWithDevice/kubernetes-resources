apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale
  namespace: tailscale

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale
  namespace: tailscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tailscale
  template:
    metadata:
      labels:
        app: tailscale
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "tailscale"
        vault.hashicorp.com/agent-inject-secret-authkey: "secret/data/tailscale"
        vault.hashicorp.com/agent-inject-template-authkey: |
          {{- with secret "secret/data/tailscale" -}}
          {{ .Data.data.authkey }}
          {{- end }}
    spec:
      serviceAccountName: tailscale

      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      containers:
      - name: tailscale
        image: tailscale/tailscale:stable

        securityContext:
          privileged: true

        env:
        - name: TS_STATE_DIR
          value: /var/lib/tailscale

        command:
        - /bin/sh
        - -c
        - |
          tailscaled --state=/var/lib/tailscale/tailscaled.state &
          sleep 5
          tailscale up --authkey=$(cat /vault/secrets/authkey) --hostname=$(hostname)

        volumeMounts:
        - name: tailscale-state
          mountPath: /var/lib/tailscale

        - name: dev-net-tun
          mountPath: /dev/net/tun

      volumes:
      - name: tailscale-state
        hostPath:
          path: /var/lib/tailscale
          type: DirectoryOrCreate

      - name: dev-net-tun
        hostPath:
          path: /dev/net/tun
          type: CharDevice

