apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale
  namespace: tailscale

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale
  namespace: tailscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tailscale
  template:
    metadata:
      labels:
        app: tailscale
    spec:
      serviceAccountName: tailscale
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      containers:
      - name: vault-agent
        image: hashicorp/vault:1.20
        args:
          - "agent"
          - "-config=/etc/vault/agent.hcl"
        volumeMounts:
        - name: vault-config
          mountPath: /etc/vault
        - name: vault-secrets
          mountPath: /vault

      - name: tailscale
        image: tailscale/tailscale:stable
        securityContext:
          privileged: true

        command:
        - /bin/sh
        - -c
        - |
          tailscaled --state=/var/lib/tailscale/tailscaled.state &
          sleep 5
          tailscale up \
            --reset \
            --authkey=$(cat /vault/secrets/authkey) \
            --hostname=$(hostname)

        volumeMounts:
        - name: tailscale-state
          mountPath: /var/lib/tailscale

        - name: vault-secrets
          mountPath: /vault

        - name: dev-net-tun
          mountPath: /dev/net/tun

      volumes:
      - name: vault-config
        configMap:
          name: tailscale-vault-agent

      - name: vault-secrets
        emptyDir: {}

      - name: tailscale-state
        hostPath:
          path: /var/lib/tailscale
          type: DirectoryOrCreate

      - name: dev-net-tun
        hostPath:
          path: /dev/net/tun
          type: CharDevice

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: tailscale-vault-agent
  namespace: tailscale
data:
  agent.hcl: |
    pid_file = "/tmp/vault-agent.pid"

    vault {
      address = "http://vault.vault.svc:8200"
    }

    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"
        config = {
          role = "tailscale"
        }
      }

      sink "file" {
        config = {
          path = "/vault/token"
        }
      }
    }

    template {
      destination = "/vault/secrets/authkey"
      contents = "{{ with secret \"secret/data/tailscale\" }}{{ .Data.data.authkey }}{{ end }}"
    }